# .github/workflows/infra.yml
# INFRASTRUCTURE pipeline (rare, high-risk changes -> gated). Kept SEPARATE from the
# app pipeline on purpose: infra changes are infrequent and need human approval.
#
# Flow:
#   PR        -> fmt-check, validate, tflint, checkov, `terraform plan` (commented on PR)
#   push main -> `terraform apply` behind a GitHub Environment with a required reviewer
#
# Auth: GitHub OIDC federation -> Azure. NO client secret stored. The `id-token: write`
# permission below is what lets the runner mint the federated token. The client/tenant/
# subscription IDs come from repo VARIABLES (not secrets), created in bootstrap.
#
# STATUS: scaffold — steps are present but most are commented until milestones 2 & 7.

name: infra

on:
  pull_request:
    paths: ["infra/**", ".github/workflows/infra.yml"]
  push:
    branches: ["main"]
    paths: ["infra/**", ".github/workflows/infra.yml"]

permissions:
  id-token: write      # required for OIDC login to Azure
  contents: read
  pull-requests: write # to post the plan as a PR comment

env:
  TF_VERSION: "1.7.5"
  WORKING_DIR: infra/environments/dev

jobs:
  plan:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      # - uses: azure/login@v2
      #   with:
      #     client-id: ${{ vars.AZURE_CLIENT_ID }}
      #     tenant-id: ${{ vars.AZURE_TENANT_ID }}
      #     subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      - name: fmt
        run: terraform -chdir=${{ env.WORKING_DIR }} fmt -check -recursive
      # - name: init
      #   run: terraform -chdir=${{ env.WORKING_DIR }} init
      # - name: validate
      #   run: terraform -chdir=${{ env.WORKING_DIR }} validate
      # - name: tflint
      #   uses: terraform-linters/setup-tflint@v4
      # - name: checkov
      #   uses: bridgecrewio/checkov-action@v12
      #   with: { directory: infra }
      # - name: plan
      #   run: terraform -chdir=${{ env.WORKING_DIR }} plan -no-color
      # TODO(milestone 7): post plan output as a PR comment

  apply:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production   # <- requires a reviewer approval in repo settings
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      # - uses: azure/login@v2
      #   with:
      #     client-id: ${{ vars.AZURE_CLIENT_ID }}
      #     tenant-id: ${{ vars.AZURE_TENANT_ID }}
      #     subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      # - run: terraform -chdir=${{ env.WORKING_DIR }} init
      # - run: terraform -chdir=${{ env.WORKING_DIR }} apply -auto-approve
      - name: placeholder
        run: echo "TODO(milestone 7): enable apply once bootstrap + modules are live"
